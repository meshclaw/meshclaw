<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>meshclaw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1rem;
      color: #666;
      margin-bottom: 3rem;
      letter-spacing: 0.01em;
    }

    .install-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1.2rem 1.8rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      cursor: pointer;
      transition: border-color 0.15s;
      max-width: 480px;
      width: 100%;
    }

    .install-box:hover { border-color: #444; }

    .install-cmd {
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 0.95rem;
      color: #e8e8e8;
      flex: 1;
      user-select: all;
    }

    .install-cmd .prompt {
      color: #444;
      margin-right: 0.5em;
    }

    .copy-btn {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      transition: color 0.15s;
      white-space: nowrap;
    }

    .copy-btn:hover { color: #aaa; }
    .copy-btn.copied { color: #4ade80; }

    .note {
      margin-top: 1.2rem;
      font-size: 0.8rem;
      color: #444;
    }

    .note a {
      color: #555;
      text-decoration: none;
    }

    .note a:hover { color: #888; }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: #333;
    }

    .footer a { color: #444; text-decoration: none; }
    .footer a:hover { color: #777; }
  </style>
</head>
<body>

  <div class="logo">meshclaw</div>
  <div class="tagline">AI workers, anywhere</div>

  <div class="install-box" onclick="copyCmd()">
    <div class="install-cmd">
      <span class="prompt">$</span>curl -sSL meshclaw.sh | bash
    </div>
    <button class="copy-btn" id="copy-btn">copy</button>
  </div>

  <div class="note">
    or &nbsp;<a href="https://pypi.org/project/meshclaw/">pip install meshclaw</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/meshclaw/meshclaw">github</a>
  </div>

  <div class="footer">
    <a href="https://github.com/meshclaw/meshclaw">meshclaw</a>
  </div>

  <script>
    function copyCmd() {
      navigator.clipboard.writeText('curl -sSL meshclaw.sh | bash');
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'copy';
        btn.classList.remove('copied');
      }, 1500);
    }
  </script>

</body>
</html>
