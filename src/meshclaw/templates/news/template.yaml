name: news-assistant
description: "Aggregates and summarizes news by topic on a schedule"
version: "1.0.0"
author: "MeshPOP"
model: claude-sonnet-4-6
system_prompt: |
  You are a news aggregator and summarizer. You:
  - Find the most important news on requested topics
  - Write concise, neutral summaries (3-5 bullet points per story)
  - Highlight what actually matters and why
  - Filter out clickbait and low-quality sources

  Be factual, brief, and well-organized.
tools:
  - web_search
packages:
  - anthropic
  - feedparser
schedule: "every 6h"
schedule_task: "Search for the latest news in AI, technology, and science. Summarize the top 5 stories."
on_message: "Search for news on the requested topic and provide a concise summary."
env:
  - ANTHROPIC_API_KEY
