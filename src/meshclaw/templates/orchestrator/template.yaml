name: orchestrator
description: "Boss worker — fans out tasks to g1-g4 GPU workers via SSH, aggregates results"
version: "1.1.0"
author: "meshclaw"
model: ollama/qwen2.5:7b
system_prompt: |
  You are the orchestrator running on the main machine (MacBook).
  You manage a fleet of GPU workers: g1, g2, g3, g4.

  Each GPU worker runs: meshclaw + Ollama (qwen2.5:7b)
  Reach them via Tailscale SSH and run:
    ssh root@<tailscale-ip> "meshclaw ask <worker-name> 'task'"

  WORKER FLEET (set Tailscale IPs via env vars, e.g. export WORKER_G1_IP=100.x.x.x):
    g1  ${WORKER_G1_IP:-100.x.x.x}  g1-worker
    g2  ${WORKER_G2_IP:-100.x.x.x}  g2-worker
    g3  ${WORKER_G3_IP:-100.x.x.x}  g3-worker
    g4  ${WORKER_G4_IP:-100.x.x.x}  g4-worker

  Your job:
  - Fan out work to multiple workers in parallel
  - Collect and aggregate their responses
  - Report summaries

  Use bash for all remote tasks — do not guess, always run commands.

schedule: "every 1h"
schedule_script: |
  #!/bin/bash
  # Coordinator: fan-out to g1-g4 and collect results in parallel

  declare -A WORKERS=(
    ["g1"]="${WORKER_G1_IP:?Set WORKER_G1_IP to Tailscale IP of g1}:g1-worker"
    ["g2"]="${WORKER_G2_IP:?Set WORKER_G2_IP to Tailscale IP of g2}:g2-worker"
    ["g3"]="${WORKER_G3_IP:?Set WORKER_G3_IP to Tailscale IP of g3}:g3-worker"
    ["g4"]="${WORKER_G4_IP:?Set WORKER_G4_IP to Tailscale IP of g4}:g4-worker"
  )

  TASK="시스템 상태 점검: CPU, 메모리, 디스크 사용량 요약"

  echo "=== Fleet Report $(date '+%Y-%m-%d %H:%M') ==="
  echo ""

  declare -A PIDS
  declare -A TMPFILES

  # Fan-out — ask all workers in parallel
  for name in "${!WORKERS[@]}"; do
    IFS=: read -r ip worker <<< "${WORKERS[$name]}"
    tmpfile=$(mktemp)
    TMPFILES[$name]=$tmpfile
    (
      result=$(ssh -o ConnectTimeout=10 \
                   -o StrictHostKeyChecking=no \
                   -o BatchMode=yes \
                   root@$ip \
                   "meshclaw ask $worker '$TASK'" 2>&1)
      echo "$result" > "$tmpfile"
    ) &
    PIDS[$name]=$!
  done

  # Collect results in order
  for name in g1 g2 g3 g4; do
    wait ${PIDS[$name]}
    echo "── $name ──────────────────────────"
    cat "${TMPFILES[$name]}"
    echo ""
    rm -f "${TMPFILES[$name]}"
  done

  echo "=== Done ==="

on_message: |
  You are the fleet orchestrator. When the user asks you to run a task:
  1. Fan it out to relevant g1-g4 workers via SSH + meshclaw ask
  2. Collect results and summarize
  Use bash tools. Worker IPs are in your system prompt.

notify:
  platform: telegram
  token: YOUR_TELEGRAM_BOT_TOKEN
  chat_id: YOUR_CHAT_ID

env:
  - WORKER_G1_IP   # Tailscale IP of g1 (run: tailscale ip -4 on g1)
  - WORKER_G2_IP   # Tailscale IP of g2
  - WORKER_G3_IP   # Tailscale IP of g3
  - WORKER_G4_IP   # Tailscale IP of g4
