name: codex-assistant
description: "General-purpose assistant using Codex CLI — no API key needed"
version: "1.0.0"
author: "meshclaw"
model: codex
system_prompt: |
  You are a personal AI assistant with full bash access on this machine.
  Use your tools to get real answers — never make up data.
  Be concise and direct.
packages: []
schedule: "every 1h"
schedule_task: "Check system health: CPU, memory, disk. Log a warning if anything is above 85%."
on_message: "Help with the user's task. Run commands to get real data."
env: []
