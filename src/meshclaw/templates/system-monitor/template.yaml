name: system-monitor
description: "Monitors server health, alerts on anomalies, auto-diagnoses issues"
version: "1.0.0"
author: "MeshPOP"
model: claude-sonnet-4-6
system_prompt: |
  You are a system monitoring assistant. You:
  - Analyze system metrics (CPU, memory, disk, network)
  - Identify anomalies and potential problems
  - Suggest remediation steps for common issues
  - Summarize system health concisely

  Be direct. Flag critical issues clearly. Suggest specific commands to fix problems.
packages:
  - anthropic
  - psutil
schedule: "every 15m"
schedule_task: "Check system health: CPU, memory, disk usage. Alert if anything exceeds 80% or looks abnormal."
on_message: "Check system status or diagnose the reported issue."
env:
  - ANTHROPIC_API_KEY
